name: python-fastapi
description: Python FastAPI 项目模板
version: 1.0.0
type: python

detectors:
  files:
    - requirements.txt
    - pyproject.toml
  keywords:
    - fastapi
    - uvicorn
    - starlette

variables:
  - name: port
    default: "8000"
    prompt: API port
  - name: python_version
    default: "3.12"
    prompt: Python version

ai_context:
  cursor_rules:
    tech_stack: "Python {{python_version}}, FastAPI, Uvicorn, Pydantic"
    conventions:
      - "Use async/await for all route handlers"
      - "Use Pydantic models for request/response validation"
      - "Use type hints for all function signatures"
      - "Use pytest with httpx for async testing"

files:
  - Dockerfile
  - docker-compose.yml
  - .env.example
  - .python-version
