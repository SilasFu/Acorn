name: golang-gin
description: Go Gin Web 框架模板
version: 1.0.0
type: go

detectors:
  files:
    - go.mod
  keywords:
    - gin-gonic/gin
    - "github.com/gin-gonic/gin"

variables:
  - name: port
    default: "8080"
    prompt: API port
  - name: go_version
    default: "1.22"
    prompt: Go version

ai_context:
  cursor_rules:
    tech_stack: "Go {{go_version}}, Gin Web Framework"
    conventions:
      - "Use standard Go project layout"
      - "Use go.mod for dependency management"
      - "Use net/http style handler signatures"
      - "Use table-driven tests with testing package"

files:
  - Dockerfile
  - docker-compose.yml
  - .env.example
