name: golang-gin
description: Go Gin Web 框架模板
version: 1.0.0
type: go

detectors:
  files:
    - go.mod
  keywords:
    - gin-gonic/gin
    - "github.com/gin-gonic/gin"

variables:
  - name: port
    default: "8080"
    prompt: API port
  - name: go_version
    default: "1.22"
    prompt: Go version

files:
  - Dockerfile
  - docker-compose.yml
  - .env.example
