name: bun-app
description: Bun 应用模板
version: 1.0.0
type: bun
min_tool_version: "0.1.0"

detectors:
  files:
    - bun.lockb
    - bun.lock
  keywords:
    - bun

variables:
  - name: port
    default: "3000"
    prompt: "应用端口"
  - name: bun_version
    default: "1"
    prompt: "Bun 版本"

ai_context:
  cursor_rules:
    tech_stack: "Bun {{bun_version}}, TypeScript, ESM"
    conventions:
      - "Use Bun's built-in test runner"
      - "Use TypeScript by default"
      - "Use Bun's SQLite client for data storage"
      - "Use fetch API for HTTP requests"

files:
  - Dockerfile
  - docker-compose.yml
  - .env.example
