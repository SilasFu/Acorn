version: "3.8"
services:
  app:
    build: .
    ports:
      - "{{port}}:{{port}}"
    volumes:
      - .:/app
    environment:
      - RAILS_ENV=development
      - DATABASE_URL={{database}}://user:pass@db:5432/app
    depends_on:
      - db

  db:
    image: {{database}}:16
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass

volumes:
  db_data:
