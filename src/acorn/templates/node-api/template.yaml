name: node-api
description: Node.js API 项目模板
version: 1.0.0
type: node

detectors:
  files:
    - package.json
  keywords:
    - express
    - koa
    - fastify

variables:
  - name: port
    default: "3000"
    prompt: API port
  - name: node_version
    default: "20"
    prompt: Node.js version

ai_context:
  cursor_rules:
    tech_stack: "Node.js {{node_version}}, Express 4, Jest"
    conventions:
      - "Use CommonJS modules"
      - "Error handling with try/catch"
      - "Use environment variables for configuration"
      - "Use Jest for unit testing"

files:
  - Dockerfile
  - docker-compose.yml
  - .env.example
