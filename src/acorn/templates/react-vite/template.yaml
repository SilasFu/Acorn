name: react-vite
description: React + Vite 前端模板
version: 1.0.0
type: node

detectors:
  files:
    - vite.config.ts
    - vite.config.js
  keywords:
    - react
    - vite

variables:
  - name: port
    default: "5173"
    prompt: Dev server port
  - name: node_version
    default: "20"
    prompt: Node.js version

ai_context:
  cursor_rules:
    tech_stack: "React 18, Vite, TypeScript, ESModules"
    conventions:
      - "Use functional components with hooks"
      - "Use TypeScript for all source files"
      - "Use CSS modules or Tailwind for styling"
      - "Use React Router for client-side routing"

files:
  - Dockerfile
  - .env.example
